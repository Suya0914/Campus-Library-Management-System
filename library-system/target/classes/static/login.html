<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - 薄荷图书馆</title>
<link rel="stylesheet" href="css/common.css"></head>
<body class="login-page">
<div class="card login-card">
    <span class="login-logo">📖</span>
    <div class="card-title">薄荷图书馆</div>
    <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" value="admin" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="admin123" required>
        </div>
        <div style="font-size:13px;color:#8aaaaa;margin-bottom:16px;text-align:center;">默认账号: admin / admin123</div>
        <button type="submit" class="btn btn-primary" style="width:100%;" onclick="submitLogin()">登 录</button>
    </form>
    <div id="messageBox" class="message-box"></div>
</div>
<script src="js/request.js"></script>
<script>
async function submitLogin(){
    const d={username:document.getElementById('username').value.trim(),password:document.getElementById('password').value.trim()};
    if(!d.username||!d.password){showMessage('messageBox','请填写用户名和密码',false);return;}
    const r=await API.login(d);
    if(r.success)window.location.href='index.html';else showMessage('messageBox',r.message,false);
}
document.getElementById('loginForm').addEventListener('keydown',function(e){if(e.key==='Enter')submitLogin();});
</script>
</body></html>
